value_format = "number"
default_visible = true
mobile_priority = 3
tooltip_what = "Shows whether older coins are mostly being held or spent."
tooltip_why = "Helps confirm whether long-term conviction is strengthening or weakening."
bullish_interpretation = "Flat or falling liveliness suggests stronger long-term holding behavior."
bearish_interpretation = "Rising liveliness suggests more older coins are being spent."
learn_more = "Liveliness reflects the balance between coin accumulation and spending over time. Rising values can indicate old supply reactivation, while falling values suggest continued holding."

[metric.puell-multiple]
id = "puell-multiple"
name = "Puell Multiple"
short_name = ""
panel_id = "cycle-regime"
enabled = true
chart_type = "line-with-zones"
update_frequency = "daily"
value_format = "ratio"
default_visible = true
