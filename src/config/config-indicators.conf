tooltip_why = "Helps show whether the market looks overheated, neutral, or depressed."
bullish_interpretation = "Recovering from low or neutral levels can support a healthier uptrend."
bearish_interpretation = "Extreme readings can signal overheating or a higher-risk market."
learn_more = "MVRV compares the current market value of Bitcoin with its realized value, which represents aggregate on-chain cost basis. It is widely used to place price in a broader cycle context."

[metric.percent-supply-in-profit]
