tooltip_why = "Helps show whether meaningful network activity is strengthening or fading."
bullish_interpretation = "Rising meaningful transfer activity supports stronger network usage."
bearish_interpretation = "Weak or fading transfer activity can signal softer participation."
learn_more = "Adjusted transfer volume aims to isolate economically meaningful on-chain transfers by filtering out some internal churn and noise. It helps show whether real settlement activity is growing or slowing."

[metric.mvrv]
id = "mvrv"
name = "MVRV"
short_name = ""
panel_id = "cycle-regime"
enabled = true
chart_type = "line-with-zones"
update_frequency = "daily"
value_format = "ratio"
default_visible = true
mobile_priority = 1
