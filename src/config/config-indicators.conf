bullish_interpretation = "Positive readings suggest long-term holders are accumulating."
bearish_interpretation = "Negative readings suggest long-term holders are distributing."
learn_more = "This metric focuses on change over time in long-term holder balances. It is useful for confirming whether experienced holders are absorbing supply or reducing exposure."

[metric.reserve-risk]
id = "reserve-risk"
name = "Reserve Risk"
short_name = ""
panel_id = "cycle-regime"
enabled = false
chart_type = "line-with-zones"
