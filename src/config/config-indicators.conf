bullish_interpretation = "Rising long-term holder supply points to accumulation and conviction."
bearish_interpretation = "Falling long-term holder supply can indicate distribution into strength."
learn_more = "Long-term holder supply estimates the amount of BTC held by entities or coins that have stayed dormant long enough to be considered conviction-driven rather than short-term traders."

[metric.sth-supply]
id = "sth-supply"
name = "STH Supply"
short_name = ""
panel_id = "cycle-regime"
