bullish_interpretation = "Negative or reset readings can reflect washed-out short-term positioning."
bearish_interpretation = "High positive readings can show newer holders are crowded into profit and more fragile."
learn_more = "Short-term holder NUPL tracks unrealized profit and loss for newer market participants. It is useful for spotting stress, local resets, and froth among reactive holders."

[metric.rhodl-ratio]
