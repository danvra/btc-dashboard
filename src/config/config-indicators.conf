bearish_interpretation = "Very high readings can show long-term holders are deep in profit and closer to distribution risk."
learn_more = "This metric focuses on unrealized profit or loss for long-term holders. It can help separate broad market strength from the profit position of Bitcoin's most conviction-driven cohort."

[metric.sth-nupl]
id = "sth-nupl"
name = "STH-NUPL"
