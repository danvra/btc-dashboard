tooltip_why = "Helps show whether miner profitability and selling pressure are unusually low or high."
bullish_interpretation = "Lower or recovering readings can suggest reduced miner-side excess."
bearish_interpretation = "Extreme highs can signal elevated miner profitability and sell pressure."
learn_more = "Puell Multiple compares current miner revenue with a long-term average to help frame whether miners are under pressure or unusually profitable, both of which can affect market structure."

[metric.pi-cycle-top]
id = "pi-cycle-top"
name = "Pi Cycle Top"
short_name = ""
panel_id = "cycle-regime"
enabled = true
chart_type = "line-with-zones"
update_frequency = "daily"
value_format = "percent"
default_visible = true
mobile_priority = 2
tooltip_what = "Compares the 111-day average with twice the 350-day average."
tooltip_why = "Helps flag when price momentum starts looking historically overheated."
bullish_interpretation = "A wide buffer between the two lines suggests less immediate top-risk."
bearish_interpretation = "A tight or crossed setup can signal a hotter late-cycle market."
learn_more = "The Pi Cycle Top indicator is a price-only cycle model built from two moving averages. It is popular in BTC communities because past major tops tended to arrive when the faster average met the slower multiplied average."

[metric.mayer-multiple]
id = "mayer-multiple"
name = "Mayer Multiple"
short_name = ""
panel_id = "cycle-regime"
enabled = true
chart_type = "line-with-zones"
update_frequency = "daily"
value_format = "ratio"
default_visible = true
mobile_priority = 2
tooltip_what = "Measures price relative to the 200-day moving average."
tooltip_why = "Helps show whether BTC looks extended, neutral, or compressed versus long-term trend."
bullish_interpretation = "Lower readings can suggest BTC is closer to long-term support than euphoria."
bearish_interpretation = "Very high readings can signal that BTC is stretched above trend."
learn_more = "Mayer Multiple divides spot price by the 200-day moving average. It is a simple long-cycle trend gauge that many BTC users watch for signs of overextension or reset."

[metric.2-year-ma-multiplier]
id = "2-year-ma-multiplier"
