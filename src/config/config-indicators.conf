tooltip_why = "Helps show whether more supply sits with reactive market participants."
bullish_interpretation = "Moderate rebuilding can support trend continuation after resets."
bearish_interpretation = "Rapid growth in short-term supply can signal froth or weaker hands."
learn_more = "Short-term holder supply tracks the portion of BTC held by newer market participants. It often expands during bullish phases and can rise sharply when speculation becomes crowded."

[metric.lth-net-position-change]
id = "lth-net-position-change"
