bullish_interpretation = "A large buffer below the 5x upper band can suggest lower cycle-overheat risk."
bearish_interpretation = "A small buffer to the 5x upper band can signal hotter cycle conditions."
learn_more = "The 2-Year MA Multiplier is a popular cycle framework that watches BTC against its 2-year moving average and the 5x upper band. It is used mostly for long-cycle context rather than short-term trading."

[metric.nupl]
id = "nupl"
