tooltip_why = "Helps judge whether BTC looks relatively attractive or expensive in cycle terms."
bullish_interpretation = "Low readings suggest price remains attractive relative to conviction."
bearish_interpretation = "High readings suggest a more expensive long-term setup."
learn_more = "Reserve Risk blends price with the opportunity cost carried by long-term holders who continue not to sell. It is often used as a high-level cycle valuation framework rather than a timing tool."

[metric.liveliness]
id = "liveliness"
