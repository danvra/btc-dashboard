bearish_interpretation = "High readings can suggest wealth is concentrated in newer coins and cycle risk is rising."
learn_more = "RHODL compares the realized value of younger coins to older coins and adjusts for market age. It is widely used to judge whether cycle wealth is concentrated in fresh speculation or long-held conviction."

