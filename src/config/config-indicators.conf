; Centralized dashboard indicator config

[panels]
order = "price-action,cycle-regime,context-confirmation,macro-market-structure"
price-action.title = "Daily / Price Action"
price-action.description = "Short-term market behavior, exchange activity, and transaction flow."
cycle-regime.title = "Cycle / Regime"
cycle-regime.description = "Market cycle positioning, holder behavior, and conviction signals."
context-confirmation.title = "Context / Confirmation"
context-confirmation.description = "Network participation and supporting confirmation indicators."
macro-market-structure.title = "Macro / Market Structure"
macro-market-structure.description = "Liquidity, rates, macro backdrop, and institutional demand."

[metric.price-vs-realized-price]
id = "price-vs-realized-price"
name = "Price vs Realized Price"
short_name = ""
panel_id = "price-action"
enabled = false
chart_type = "line-with-zones"
update_frequency = "daily"
value_format = "price"
default_visible = true
mobile_priority = 1
tooltip_what = "Compares BTC price with the average on-chain cost basis."
tooltip_why = "Helps show whether the market trades above or below the average holder's price."
bullish_interpretation = "Price holds above realized price, showing stronger market positioning."
bearish_interpretation = "Price falls below realized price, showing weaker market positioning."
learn_more = "This metric compares spot price with the average price at which coins last moved on-chain. Holding above it often signals stronger conditions, while trading below it can suggest broader holder stress."

[metric.asopr]
id = "asopr"
name = "aSOPR"
short_name = ""
panel_id = "price-action"
enabled = false
chart_type = "line"
update_frequency = "daily"
value_format = "ratio"
default_visible = true
mobile_priority = 1
tooltip_what = "Shows whether coins moved today were sold at a profit or a loss."
tooltip_why = "Helps reveal whether the market is taking profits or realizing pain."
bullish_interpretation = "aSOPR stays above 1 with brief resets that quickly recover."
bearish_interpretation = "aSOPR stays below 1, showing losses are being realized."
learn_more = "Adjusted SOPR looks at whether coins spent on-chain are locking in gains or losses. It can help show whether the market is accepting higher prices or struggling to hold them."

[metric.exchange-netflow]
id = "exchange-netflow"
name = "Exchange Netflow"
short_name = ""
panel_id = "price-action"
enabled = false
chart_type = "histogram"
update_frequency = "daily"
value_format = "btc"
default_visible = true
mobile_priority = 2
tooltip_what = "Measures net BTC moving into or out of exchanges."
tooltip_why = "Helps gauge whether coins are positioning for sale or moving off-platform to hold."
bullish_interpretation = "Net outflows suggest coins are leaving exchanges to be held."
bearish_interpretation = "Net inflows suggest more supply may be available to sell."
learn_more = "Exchange netflow tracks the balance of incoming and outgoing BTC across trading venues. It is often used as a simple read on near-term sell pressure versus self-custody or accumulation behavior."

[metric.exchange-balance]
id = "exchange-balance"
name = "Exchange Balance / Exchange Reserve"
short_name = "Exchange Reserve"
panel_id = "price-action"
enabled = false
chart_type = "area"
update_frequency = "daily"
value_format = "btc"
default_visible = true
mobile_priority = 2
tooltip_what = "Tracks how much BTC is sitting on exchanges."
tooltip_why = "Helps show how much liquid supply is readily available to be sold."
bullish_interpretation = "Falling exchange balances suggest tighter liquid supply."
bearish_interpretation = "Rising exchange balances suggest more BTC is available to sell."
learn_more = "Exchange reserve follows the amount of Bitcoin held on major exchanges. Lower balances can support a tighter supply backdrop, while rising balances can increase available sell-side liquidity."

[metric.adjusted-transfer-volume]
id = "adjusted-transfer-volume"
name = "Adjusted Transfer Volume"
short_name = ""
