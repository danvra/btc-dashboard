bearish_interpretation = "Very high NUPL can signal euphoric conditions and higher cycle risk."
learn_more = "NUPL compares unrealized gains and losses across the market relative to market value. It is a classic cycle indicator for spotting capitulation, recovery, and euphoric phases."

[metric.lth-nupl]
id = "lth-nupl"
