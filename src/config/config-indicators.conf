tooltip_why = "Helps reveal whether most holders are comfortable or under pressure."
bullish_interpretation = "Rising readings show more holders are back in profit."
bearish_interpretation = "Low readings show more holders are underwater and under stress."
learn_more = "This metric estimates the share of circulating supply whose last on-chain move occurred below the current price. It helps frame whether the market is broadly profitable or under pressure."

[metric.lth-supply]
id = "lth-supply"
