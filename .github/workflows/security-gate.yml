name: Security Gate

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

concurrency:
  group: security-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify npm package signatures
        run: npm audit signatures

      - name: Build application
        run: npm run build

      - name: Write build summary
        run: |
          {
            echo "### Build"
            echo
            echo "- npm ci: passed"
            echo "- npm audit signatures: passed"
            echo "- npm run build: passed"
          } >> "$GITHUB_STEP_SUMMARY"
