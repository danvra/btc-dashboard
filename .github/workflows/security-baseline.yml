name: Security Baseline

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

concurrency:
  group: security-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Write build summary
        run: |
          {
            echo "### Build"
            echo
            echo "- npm ci: passed"
            echo "- npm run build: passed"
          } >> "$GITHUB_STEP_SUMMARY"

  sast:
    name: sast
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep CE
        run: python -m pip install --upgrade pip semgrep

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run blocking Semgrep rules
        id: semgrep_critical
        continue-on-error: true
        run: semgrep scan --config .semgrep/critical.yml --json --output reports/semgrep-critical.json .

      - name: Run audit Semgrep rules
        id: semgrep_audit
        continue-on-error: true
        run: semgrep scan --config .semgrep/audit.yml --json --output reports/semgrep-audit.json . || true

      - name: Summarize Semgrep results
        if: always()
        env:
          CRITICAL_OUTCOME: ${{ steps.semgrep_critical.outcome }}
          AUDIT_OUTCOME: ${{ steps.semgrep_audit.outcome }}
        run: |
          critical_count="$(jq '.results | length' reports/semgrep-critical.json 2>/dev/null || echo 0)"
          audit_count="$(jq '.results | length' reports/semgrep-audit.json 2>/dev/null || echo 0)"

          {
            echo "### SAST"
            echo
            echo "- Blocking Semgrep findings: ${critical_count}"
            echo "- Blocking rules status: ${CRITICAL_OUTCOME}"
            echo "- Audit Semgrep findings: ${audit_count}"
            echo "- Audit rules status: ${AUDIT_OUTCOME}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Semgrep reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-security-baseline
          path: reports/semgrep-*.json
          if-no-files-found: error

      - name: Enforce blocking Semgrep findings
        if: steps.semgrep_critical.outcome == 'failure'
        run: |
          echo "Blocking Semgrep findings were detected."
          exit 1

  sca:
    name: sca
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run blocking Trivy dependency scan
        id: trivy_blocking
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: library
          severity: CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
          hide-progress: true
          skip-dirs: dist,node_modules

      - name: Export Trivy dependency report
        if: always()
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: reports/trivy-report.json
          exit-code: "0"
          hide-progress: true
          skip-dirs: dist,node_modules
          skip-setup-trivy: true

      - name: Summarize Trivy results
        if: always()
        env:
          TRIVY_OUTCOME: ${{ steps.trivy_blocking.outcome }}
        run: |
          trivy_count="$(jq '[.Results[]?.Vulnerabilities[]?] | length' reports/trivy-report.json 2>/dev/null || echo 0)"

          {
            echo "### SCA"
            echo
            echo "- High/Critical vulnerabilities reported: ${trivy_count}"
            echo "- Blocking scan status: ${TRIVY_OUTCOME}"
            echo "- Blocking threshold: CRITICAL only"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-baseline
          path: reports/trivy-report.json
          if-no-files-found: error

      - name: Enforce blocking Trivy findings
        if: steps.trivy_blocking.outcome == 'failure'
        run: |
          echo "Critical dependency vulnerabilities were detected."
          exit 1

  secrets:
    name: secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        uses: gacts/gitleaks@v1
        with:
          version: latest

      - name: Collect Gitleaks report
        if: always()
        env:
          GITLEAKS_SARIF: ${{ steps.gitleaks.outputs.sarif }}
        run: |
          if [ -n "${GITLEAKS_SARIF}" ] && [ -f "${GITLEAKS_SARIF}" ]; then
            cp "${GITLEAKS_SARIF}" reports/gitleaks.sarif
          else
            printf '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"gitleaks"}},"results":[]}]}\n' > reports/gitleaks.sarif
          fi

      - name: Summarize Gitleaks results
        if: always()
        env:
          GITLEAKS_OUTCOME: ${{ steps.gitleaks.outcome }}
          GITLEAKS_EXIT_CODE: ${{ steps.gitleaks.outputs.exit-code }}
        run: |
          secret_count="$(jq '[.runs[]?.results[]?] | length' reports/gitleaks.sarif 2>/dev/null || echo 0)"

          {
            echo "### Secret Scanning"
            echo
            echo "- Gitleaks findings: ${secret_count}"
            echo "- Scan status: ${GITLEAKS_OUTCOME}"
            echo "- Exit code: ${GITLEAKS_EXIT_CODE:-0}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-security-baseline
          path: reports/gitleaks.sarif
          if-no-files-found: error

      - name: Enforce Gitleaks findings
        if: steps.gitleaks.outputs.exit-code != '0'
        run: |
          echo "Gitleaks detected one or more secrets."
          exit 1
