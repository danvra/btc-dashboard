name: Security Baseline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: security-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify npm package signatures
        run: npm audit signatures

      - name: Build application
        run: npm run build

      - name: Write build summary
        run: |
          {
            echo "### Build"
            echo
            echo "- npm ci: passed"
            echo "- npm audit signatures: passed"
            echo "- npm run build: passed"
          } >> "$GITHUB_STEP_SUMMARY"

  sast:
    name: sast
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reinstall latest Semgrep CE
        run: python -m pip install --upgrade --force-reinstall semgrep

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Semgrep default rules
        id: semgrep_scan
        continue-on-error: true
        run: semgrep scan --config auto --error --sarif --output reports/semgrep-results.sarif .

      - name: Summarize Semgrep results
        if: always()
        env:
          SEMGREP_OUTCOME: ${{ steps.semgrep_scan.outcome }}
        run: |
          finding_count="$(jq '[.runs[]?.results[]?] | length' reports/semgrep-results.sarif 2>/dev/null || echo 0)"

          {
            echo "### SAST"
            echo
            echo "- Semgrep findings: ${finding_count}"
            echo "- Ruleset: auto"
            echo "- Scan status: ${SEMGREP_OUTCOME}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Semgrep SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-security-baseline
          path: reports/semgrep-results.sarif
          if-no-files-found: error

      - name: Enforce Semgrep findings
        if: steps.semgrep_scan.outcome == 'failure'
        run: |
          echo "Semgrep detected one or more findings."
          exit 1

  sca:
    name: sca
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5
    with:
      scan-args: |-
        --lockfile=./package-lock.json
      fail-on-vuln: true
      upload-sarif: true

  secrets:
    name: secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        uses: gacts/gitleaks@v1
        with:
          version: latest

      - name: Collect Gitleaks report
        if: always()
        env:
          GITLEAKS_SARIF: ${{ steps.gitleaks.outputs.sarif }}
        run: |
          if [ -n "${GITLEAKS_SARIF}" ] && [ -f "${GITLEAKS_SARIF}" ]; then
            cp "${GITLEAKS_SARIF}" reports/gitleaks.sarif
          else
            printf '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"gitleaks"}},"results":[]}]}\n' > reports/gitleaks.sarif
          fi

      - name: Summarize Gitleaks results
        if: always()
        env:
          GITLEAKS_OUTCOME: ${{ steps.gitleaks.outcome }}
          GITLEAKS_EXIT_CODE: ${{ steps.gitleaks.outputs.exit-code }}
        run: |
          secret_count="$(jq '[.runs[]?.results[]?] | length' reports/gitleaks.sarif 2>/dev/null || echo 0)"

          {
            echo "### Secret Scanning"
            echo
            echo "- Gitleaks findings: ${secret_count}"
            echo "- Scan status: ${GITLEAKS_OUTCOME}"
            echo "- Exit code: ${GITLEAKS_EXIT_CODE:-0}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-security-baseline
          path: reports/gitleaks.sarif
          if-no-files-found: error

      - name: Upload Gitleaks SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/gitleaks.sarif
          category: gitleaks

      - name: Enforce Gitleaks findings
        if: steps.gitleaks.outputs.exit-code != '0'
        run: |
          echo "Gitleaks detected one or more secrets."
          exit 1
